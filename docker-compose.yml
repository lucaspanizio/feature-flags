services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-unleash}
      POSTGRES_USER: ${DATABASE_USERNAME:-unleash_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?defina DATABASE_PASSWORD no arquivo .env}
    volumes:
      - unleash_db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username=${DATABASE_USERNAME:-unleash_user} --dbname=${DATABASE_NAME:-unleash}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  unleash:
    image: unleashorg/unleash-server:${UNLEASH_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${UNLEASH_PORT:-4242}:4242"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-unleash}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-unleash_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?defina DATABASE_PASSWORD no arquivo .env}
      DATABASE_SSL: "false"
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      UNLEASH_URL: ${UNLEASH_URL:-http://localhost:4242}
      UNLEASH_DEFAULT_ADMIN_USERNAME: ${UNLEASH_ADMIN_USERNAME:-admin}
      UNLEASH_DEFAULT_ADMIN_PASSWORD: ${UNLEASH_ADMIN_PASSWORD:?defina UNLEASH_ADMIN_PASSWORD no arquivo .env}
      # Origens (do app React/browser) autorizadas a chamar a Frontend API. Separe múltiplas por vírgula.
      UNLEASH_FRONTEND_API_ORIGINS: ${UNLEASH_FRONTEND_API_ORIGINS:-*}
      # Tokens criados automaticamente na primeira inicialização do banco (idempotente depois disso).
      INIT_BACKEND_API_TOKENS: ${INIT_BACKEND_API_TOKENS:-default:development.unleash-insecure-api-token}
      INIT_FRONTEND_API_TOKENS: ${INIT_FRONTEND_API_TOKENS:-default:development.unleash-insecure-frontend-api-token}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4242/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  unleash_db_data:
